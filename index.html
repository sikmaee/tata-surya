<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUXXI - Solar System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash-screen" class="splash-screen">
        <div class="stars-bg"></div>
        <div class="splash-content">
            <div class="loader-ring"></div>
            <h1 class="splash-title" data-i18n="splashTitle">MEMASUKI TATA SURYA...</h1>
        </div>
    </div>

    <!-- Main Content -->
    <main id="main-content" class="hidden">
        <!-- Background Stars -->
        <div class="twinkling-stars"></div>
        <div class="space-dust"></div>

        <!-- Header / Nav -->
        <header>
            <div class="logo">
                <span class="author">RUXXI</span>
                <span class="subtitle" data-i18n="headerSubtitle">Solar Exploration</span>
            </div>
            <div class="lang-toggle">
                <button id="btn-id" class="active">ID</button>
                <button id="btn-en">EN</button>
            </div>
        </header>

        <!-- Solar System Map -->
        <section class="solar-system">
            <div class="sun-container clickable" id="sun-element">
                <div class="sun"></div>
                <span class="planet-label" data-i18n="sunLabel">Matahari</span>
            </div>

            <div class="planets-wrapper">
                <!-- Planets will be generated via JS to easily bind data -->
            </div>
        </section>

        <!-- Info Modal -->
        <div id="info-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content glass-panel">
                <button class="close-btn">&times;</button>
                <div class="modal-header">
                    <div class="modal-planet-visual" id="modal-visual"></div>
                    <h2 id="modal-title">Planet Name</h2>
                </div>
                <div class="modal-body">
                    <p id="modal-desc" class="desc">Description here...</p>
                    
                    <div class="info-grid">
                        <div class="info-box">
                            <span class="info-label" data-i18n="typeLabel">Kategori</span>
                            <strong id="modal-type">Tipe</strong>
                        </div>
                        <div class="info-box">
                            <span class="info-label" data-i18n="distanceLabel">Jarak dari Matahari</span>
                            <strong id="modal-distance">0 km</strong>
                        </div>
                        <div class="info-box">
                            <span class="info-label" data-i18n="radiusLabel">Radius</span>
                            <strong id="modal-radius">0 km</strong>
                        </div>
                        <div class="info-box">
                            <span class="info-label" data-i18n="massLabel">Massa</span>
                            <strong id="modal-mass">0 kg</strong>
                        </div>
                        <div class="info-box">
                            <span class="info-label" data-i18n="gravityLabel">Gravitasi</span>
                            <strong id="modal-gravity">0 m/s²</strong>
                        </div>
                        <div class="info-box">
                            <span class="info-label" data-i18n="moonsLabel">Satelit Alami</span>
                            <strong id="modal-moons">0</strong>
                        </div>
                    </div>

                    <div class="fun-fact">
                        <strong data-i18n="factLabel">Fakta Menarik:</strong>
                        <p id="modal-fact">Fun fact here...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
