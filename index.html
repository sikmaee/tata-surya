<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eksplorasi Tata Surya 3D - by Ruxxi</title>
    
    <!-- Impor Library Three.js untuk 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Impor Library MediaPipe untuk Deteksi Tangan (AI Kamera) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --glass-bg: rgba(15, 20, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e0e6ed;
            --accent: #00ffcc;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-main);
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through to 3D canvas if needed */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .title-box h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .author {
            font-size: 0.9rem;
            color: var(--accent);
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .controls-info {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 15px 25px;
            border-radius: 15px;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .controls-info span { color: var(--accent); font-weight: bold; }

        /* Status Kamera & Gestur */
        .status-box {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--accent);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        /* Panel Penjelasan Planet */
        #info-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(150%);
            width: 80%;
            max-width: 800px;
            background: rgba(10, 15, 25, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: auto;
        }

        #info-panel.active {
            transform: translateX(-50%) translateY(0);
        }

        #planet-name {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            color: #fff;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }

        #planet-desc {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #ccc;
            text-align: justify;
        }

        /* Video Feed (Kecil di pojok) */
        #video-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid var(--glass-border);
            pointer-events: auto;
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror */
        }

        /* Layar Mulai */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #start-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent);
        }
        
        .loading-text {
            margin-top: 20px;
            color: #888;
            font-style: italic;
        }

    </style>
</head>
<body>

    <!-- Layar Mulai (Untuk memicu Fullscreen dan izin kamera) -->
    <div id="start-screen">
        <h1 style="font-weight: 300; letter-spacing: 5px; margin-bottom: 10px;">EKSPLORASI TATA SURYA</h1>
        <p style="color: #888; margin-bottom: 40px;">Author: Ruxxi | Resolusi UHD 4K Mode</p>
        <button id="start-btn">Mulai Perjalanan</button>
        <p class="loading-text" id="loading-msg"></p>
    </div>

    <!-- Kontainer 3D -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer">
        <header>
            <div class="title-box">
                <h1 id="ui-planet-title">MATAHARI</h1>
                <div class="author">Author = Ruxxi</div>
            </div>
            
            <div class="controls-info">
                <div><span>1 Jari</span> : Buka/Tutup Info</div>
                <div><span>2 Jari</span> : Geser Kanan (Next)</div>
                <div><span>3 Jari</span> : Geser Kiri (Prev)</div>
                <div><span>4 Jari</span> : Planet Acak</div>
            </div>
        </header>

        <div class="status-box" id="gesture-status">Menunggu Gestur...</div>

        <!-- Panel Info -->
        <div id="info-panel">
            <h2 id="planet-name">Nama Planet</h2>
            <div id="planet-desc">Penjelasan akan muncul di sini...</div>
        </div>
    </div>

    <!-- Feed Kamera -->
    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

<script>
    /* ==========================================
       BAGIAN 1: DATA PLANET & KONTEN (BAHASA MANUSIA)
       ========================================== */
    const planetsData = [
        {
            name: "Matahari",
            color: 0xffcc00,
            emissive: 0xff5500,
            size: 6,
            desc: "Pusat tata surya kita, sang bintang raksasa yang memberi kehidupan. Bayangkan sebuah bola gas panas yang ukurannya jutaan kali lebih besar dari tempat kita berpijak. Tanpa cahayanya yang hangat, tata surya ini hanyalah ruang hampa yang gelap dan beku. Matahari itu hidup, terus bergolak dengan badai matahari yang dahsyat."
        },
        {
            name: "Merkurius",
            color: 0x888888,
            emissive: 0x000000,
            size: 2,
            desc: "Planet mungil yang pemberani, berlari paling cepat mengelilingi Matahari. Siang di Merkurius bisa melelehkan timah, sementara malamnya membekukan tulang. Permukaannya penuh luka berupa kawah, saksi bisu dari tabrakan meteorit sejak miliaran tahun lalu. Tidak ada udara di sini untuk menghantarkan suara, hanya keheningan abadi."
        },
        {
            name: "Venus",
            color: 0xe3bb76,
            emissive: 0x221100,
            size: 3.5,
            desc: "Sering disebut kembaran Bumi karena ukurannya, tapi percayalah, Venus adalah neraka yang menyamar. Planet ini diselimuti awan tebal asam sulfat yang beracun, menjebak panas matahari hingga permukaannya cukup panas untuk melelehkan logam. Anehnya, Venus berputar mundur—di sana, matahari terbit dari barat."
        },
        {
            name: "Bumi",
            color: 0x2b82c9,
            emissive: 0x001133,
            size: 3.6,
            desc: "Tempat kita pulang. Satu-satunya titik terang berwarna biru pucat di alam semesta yang kita tahu memiliki tawa, tangis, dan kehidupan. Dari samudra yang dalam hingga pegunungan yang menjulang, Bumi adalah keajaiban dengan perlindungan atmosfer yang pas. Jaga baik-baik planet ini, karena sejauh ini, kita belum punya tempat cadangan."
        },
        {
            name: "Mars",
            color: 0xc1440e,
            emissive: 0x220000,
            size: 2.5,
            desc: "Sang tetangga berdebu merah. Mars adalah gurun pasir raksasa dengan gunung api tertinggi yang pernah ada dan ngarai yang sangat dalam. Dulu, mungkin air pernah mengalir deras di sini. Kini, Mars hanya ditemani oleh robot-robot penjelajah buatan manusia yang diam-diam mencari jejak kehidupan di antara bebatuan dinginnya."
        },
        {
            name: "Jupiter",
            color: 0xd39c7e,
            emissive: 0x110500,
            size: 8,
            desc: "Raja tata surya. Jupiter bukan sekadar planet, melainkan badai raksasa yang tak pernah berhenti bergulung. Lihat saja 'Bintik Merah Raksasa'-nya, itu adalah pusaran angin puting beliung yang ukurannya lebih besar dari planet Bumi dan telah mengamuk selama ratusan tahun. Dia adalah tameng gravitasi kita dari komet-komet liar."
        },
        {
            name: "Saturnus",
            color: 0xead6b8,
            emissive: 0x111100,
            size: 6.5,
            hasRings: true,
            desc: "Perhiasan terindah di langit. Saturnus dikelilingi oleh cincin es dan bebatuan yang berkilauan bagaikan mahkota. Meskipun ukurannya raksasa, gas yang membentuknya sangat ringan. Coba bayangkan jika ada lautan yang cukup besar untuk menampungnya, planet ini akan mengapung seperti pelampung."
        },
        {
            name: "Uranus",
            color: 0x4b70dd,
            emissive: 0x001122,
            size: 5,
            desc: "Si pemberontak es yang menggelinding. Entah tabrakan besar apa di masa lalu yang membuatnya berputar miring, sehingga Uranus seolah menggelinding bagai bola bowling mengelilingi matahari. Atmosfernya sangat dingin dan tenang, memancarkan warna biru pucat yang misterius karena kandungan gas metananya."
        },
        {
            name: "Neptunus",
            color: 0x274687,
            emissive: 0x000022,
            size: 4.8,
            desc: "Penjaga batas terluar. Neptunus adalah dunia es yang gelap, sangat jauh, dan dihantam angin terkencang di tata surya—angin di sini bisa merobek apa saja dengan kecepatan di atas pesawat supersonik. Tempat ini begitu sepi, mengorbit matahari dalam keheningan biru yang gelap dan pekat."
        }
    ];

    let currentPlanetIndex = 0;
    let isInfoOpen = false;

    /* ==========================================
       BAGIAN 2: SETUP 3D (THREE.JS) UHD QUALITY
       ========================================== */
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    
    // Setup Kamera 3D
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 25;

    // Setup Renderer (UHD/4K feel)
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Kualitas tinggi
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    // Pencahayaan
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 1.5, 100);
    pointLight.position.set(20, 10, 20);
    scene.add(pointLight);
    
    const backLight = new THREE.PointLight(0x4444ff, 0.5, 100);
    backLight.position.set(-20, -10, -20);
    scene.add(backLight);

    // Partikel Bintang Latar Belakang
    function createStars() {
        const starGeo = new THREE.BufferGeometry();
        const starCount = 3000;
        const posArray = new Float32Array(starCount * 3);
        
        for(let i = 0; i < starCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 200;
        }
        
        starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starMat = new THREE.PointsMaterial({ size: 0.1, color: 0xffffff, transparent: true, opacity: 0.8 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        return stars;
    }
    const stars = createStars();

    // Objek Planet Utama
    let currentMesh;
    let ringMesh;
    const planetGroup = new THREE.Group();
    scene.add(planetGroup);

    function createProceduralTexture(baseColor) {
        // Membuat tekstur prosedural sederhana pakai canvas agar terlihat detail tanpa gambar eksternal
        const canvas = document.createElement('canvas');
        canvas.width = 1024;
        canvas.height = 1024;
        const context = canvas.getContext('2d');
        
        context.fillStyle = '#' + baseColor.toString(16).padStart(6, '0');
        context.fillRect(0, 0, 1024, 1024);
        
        // Tambah noise untuk detail
        for (let i = 0; i < 20000; i++) {
            context.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
            context.fillRect(Math.random() * 1024, Math.random() * 1024, Math.random() * 5 + 1, Math.random() * 5 + 1);
        }
        
        return new THREE.CanvasTexture(canvas);
    }

    function renderPlanet(index) {
        const data = planetsData[index];
        
        // Update UI Text
        document.getElementById('ui-planet-title').innerText = data.name.toUpperCase();
        document.getElementById('planet-name').innerText = data.name;
        document.getElementById('planet-desc').innerText = data.desc;

        // Hapus planet lama
        if (currentMesh) planetGroup.remove(currentMesh);
        if (ringMesh) planetGroup.remove(ringMesh);

        // Buat geometry dengan segmen sangat tinggi (UHD feel)
        const geometry = new THREE.SphereGeometry(data.size, 128, 128);
        
        // Material
        const texture = createProceduralTexture(data.color);
        const material = new THREE.MeshStandardMaterial({ 
            map: texture,
            roughness: 0.7,
            metalness: 0.1,
            emissive: data.emissive,
            emissiveIntensity: 0.2
        });

        // Efek khusus untuk matahari
        if(index === 0) {
            material.emissiveIntensity = 1;
            material.wireframe = true; // Beri kesan jilatan energi untuk Matahari karena tanpa shader khusus
        }

        currentMesh = new THREE.Mesh(geometry, material);
        planetGroup.add(currentMesh);

        // Tambah cincin jika Saturnus
        if (data.hasRings) {
            const ringGeo = new THREE.TorusGeometry(data.size * 1.5, 0.8, 16, 100);
            const ringMat = new THREE.MeshStandardMaterial({ 
                color: 0xddccaa, 
                roughness: 0.5,
                transparent: true,
                opacity: 0.8
            });
            ringMesh = new THREE.Mesh(ringGeo, ringMat);
            ringMesh.rotation.x = Math.PI / 2.2;
            planetGroup.add(ringMesh);
        }

        // Animasi transisi scale
        planetGroup.scale.set(0.01, 0.01, 0.01);
        let scaleVal = 0.01;
        const grow = setInterval(() => {
            scaleVal += 0.05;
            if (scaleVal >= 1) {
                planetGroup.scale.set(1, 1, 1);
                clearInterval(grow);
            } else {
                planetGroup.scale.set(scaleVal, scaleVal, scaleVal);
            }
        }, 16);
    }

    // Animasi Loop
    function animate() {
        requestAnimationFrame(animate);
        
        // Rotasi Planet
        if (currentMesh) {
            currentMesh.rotation.y += 0.003;
        }
        if (ringMesh) {
            ringMesh.rotation.z -= 0.001;
        }
        
        // Rotasi Bintang perlahan
        stars.rotation.y += 0.0005;

        // Gerakan mengambang perlahan (Floating effect)
        planetGroup.position.y = Math.sin(Date.now() * 0.001) * 0.5;

        renderer.render(scene, camera);
    }

    // Handle Resize Layar
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    /* ==========================================
       BAGIAN 3: LOGIKA GESTUR (AI MEDIAPIPE)
       ========================================== */
    const videoElement = document.getElementById('webcam');
    const statusBox = document.getElementById('gesture-status');
    const infoPanel = document.getElementById('info-panel');
    
    let lastGestureTime = 0;
    const cooldown = 1500; // 1.5 detik jeda antar gestur agar tidak terpicu berulang

    // Fungsi menghitung jari yang berdiri
    function countFingers(landmarks) {
        let count = 0;
        
        // Index ujung jari dan pip (sendi tengah)
        // Telunjuk: ujung=8, pip=6
        // Tengah: ujung=12, pip=10
        // Manis: ujung=16, pip=14
        // Kelingking: ujung=20, pip=18
        
        // Asumsi tangan menghadap kamera (Y ke bawah positif, jadi ujung lebih KECIL dari pip jika berdiri)
        if (landmarks[8].y < landmarks[6].y) count++;
        if (landmarks[12].y < landmarks[10].y) count++;
        if (landmarks[16].y < landmarks[14].y) count++;
        if (landmarks[20].y < landmarks[18].y) count++;
        
        return count;
    }

    function handleGestures(fingerCount) {
        const now = Date.now();
        if (now - lastGestureTime < cooldown) return; // Dalam masa cooldown

        switch(fingerCount) {
            case 1:
                // 1 Jari -> Toggle Info Panel
                isInfoOpen = !isInfoOpen;
                if(isInfoOpen) {
                    infoPanel.classList.add('active');
                    statusBox.innerText = "Info Dibuka (1 Jari)";
                } else {
                    infoPanel.classList.remove('active');
                    statusBox.innerText = "Info Ditutup (1 Jari)";
                }
                lastGestureTime = now;
                break;
            case 2:
                // 2 Jari -> Slide Kanan (Next Planet)
                currentPlanetIndex++;
                if(currentPlanetIndex >= planetsData.length) currentPlanetIndex = 0;
                renderPlanet(currentPlanetIndex);
                if(isInfoOpen) { infoPanel.classList.remove('active'); isInfoOpen = false; }
                statusBox.innerText = "Geser Kanan: " + planetsData[currentPlanetIndex].name;
                lastGestureTime = now;
                break;
            case 3:
                // 3 Jari -> Slide Kiri (Prev Planet)
                currentPlanetIndex--;
                if(currentPlanetIndex < 0) currentPlanetIndex = planetsData.length - 1;
                renderPlanet(currentPlanetIndex);
                if(isInfoOpen) { infoPanel.classList.remove('active'); isInfoOpen = false; }
                statusBox.innerText = "Geser Kiri: " + planetsData[currentPlanetIndex].name;
                lastGestureTime = now;
                break;
            case 4:
                // 4 Jari -> Acak (Random Planet)
                let randIndex;
                do {
                    randIndex = Math.floor(Math.random() * planetsData.length);
                } while(randIndex === currentPlanetIndex);
                currentPlanetIndex = randIndex;
                renderPlanet(currentPlanetIndex);
                if(isInfoOpen) { infoPanel.classList.remove('active'); isInfoOpen = false; }
                statusBox.innerText = "Pilihan Acak: " + planetsData[currentPlanetIndex].name;
                lastGestureTime = now;
                break;
            default:
                // Tangan terlihat tapi tidak sesuai pola (0 jari berdiri / ibu jari saja dll)
                break;
        }

        // Reset status box text setelah beberapa saat
        if(now - lastGestureTime > cooldown) {
            statusBox.innerText = "Terdeteksi Tangan. Silakan bentuk gestur.";
        }
    }

    // Setup MediaPipe Hands
    const hands = new Hands({
        locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    hands.onResults((results) => {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const landmarks = results.multiHandLandmarks[0];
            const fingerCount = countFingers(landmarks);
            
            // Berikan indikator ke user bahwa kamera melihat tangan mereka
            if(Date.now() - lastGestureTime > cooldown) {
               statusBox.innerText = `Terbaca: ${fingerCount} Jari`;
            }
            
            // Eksekusi Logika
            if(fingerCount >= 1 && fingerCount <= 4) {
                handleGestures(fingerCount);
            }
        } else {
            if(Date.now() - lastGestureTime > cooldown) {
                statusBox.innerText = "Arahkan Tangan ke Kamera";
            }
        }
    });

    /* ==========================================
       BAGIAN 4: INISIALISASI & FULLSCREEN
       ========================================== */
    const startBtn = document.getElementById('start-btn');
    const startScreen = document.getElementById('start-screen');
    const loadingMsg = document.getElementById('loading-msg');

    function enterFullScreen() {
        const elem = document.documentElement;
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) { /* Safari */
            elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) { /* IE11 */
            elem.msRequestFullscreen();
        }
    }

    startBtn.addEventListener('click', async () => {
        // Minta Fullscreen
        enterFullScreen();
        
        loadingMsg.innerText = "Meminta izin akses kamera...";
        startBtn.style.display = 'none';

        try {
            // Inisialisasi Kamera Web
            const cameraControls = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({image: videoElement});
                },
                width: 320,
                height: 240
            });
            await cameraControls.start();

            // Sembunyikan layar mulai, render planet pertama
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
            }, 1000);

            renderPlanet(currentPlanetIndex); // Tampilkan Matahari
            animate(); // Mulai loop 3D

        } catch (err) {
            console.error(err);
            loadingMsg.innerText = "Gagal mengakses kamera. Izinkan kamera di browser Anda.";
            startBtn.style.display = 'block';
            startBtn.innerText = "Coba Lagi";
        }
    });

</script>
</body>
</html>
